name: Pre-Deploy Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Lint
        run: pnpm run lint
        
      - name: Type check
        run: pnpm run typecheck || echo "TypeScript check skipped (no typecheck script)"
        
      - name: Build
        run: pnpm run build
        
  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build
        run: pnpm run build
        
      - name: Install serve
        run: npm install -g serve
        
      - name: Start server and test
        run: |
          serve dist -l 3000 &
          sleep 5
          curl -f http://localhost:3000 || exit 1
          curl -s http://localhost:3000 | grep -q "Vanciety" || exit 1
          echo "✅ Smoke test passed - Vanciety homepage renders"
